<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Feedback Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #4338ca;
      display: flex;
      justify-content: center;
      align-items: center;
      height: auto;
    }

    .feedback-form {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 400px;
    }

    h1 {
      text-align: center;
      color: #4338ca;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 10px 0 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 5px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: #0e65cf;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #004d40;
    }
    
    a {
      width: 100%;
      margin-top: 20px;
      padding: 1cqmin;
      background: #00796b;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-align: center;
      margin: 10px 0 5px;
      justify-content: center;
    }
    a:hover {
      background: #004d40;
    }
  </style>
</head>
<body>
  <form class="feedback-form", name="submit-to-google-sheet", action="thankyu.html" method="GET">
    <h1>Student Feedback</h1>

    <label for="name">faculty name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">branch/class</label>
    <input type="text" id="branch" name="branch" required>
    <label for="name">year</label>
    <select id="name" name="year">
    <option value="1st">1st </option>
      <option value="2nd">2nd</option>
      <option value="3rd">3rd</option>
      <option value="4th">4th</option>
    </select>


    <label for="course">Course Name</label>
    <input type="text" id="course" name="course" required>

    <label for="rating">explenation</label>
    <select id="rating" name="explenation">
      <option value="Excellent">Excellent</option>
      <option value="Good">Good</option>
      <option value="Average">Average</option>
      <option value="Poor">Poor</option>
    </select>
    <label for="rating">panctuality</label>
    <select id="rating" name="panctuality">
      <option value="Excellent">Excellent</option>
      <option value="Good">Good</option>
      <option value="Average">Average</option>
      <option value="Poor">Poor</option>
    </select>
    <label for="rating">subject knowledge</label>
    <select id="rating" name="subject knowledge">
      <option value="Excellent">Excellent</option>
      <option value="Good">Good</option>
      <option value="Average">Average</option>
      <option value="Poor">Poor</option>
    </select>
    <label for="rating">notes provide</label>
    <select id="rating" name="notes provide">
      <option value="Excellent">Excellent</option>
      <option value="Good">Good</option>
      <option value="Average">Average</option>
      <option value="Poor">Poor</option>
    </select>
    

    <label for="comments">Additional Comments</label>
    <textarea id="comments" name="comments" rows="4" placeholder="Your feedback..."></textarea>

    <button type="submit">Submit Feedback</button><br></br>
  </form>
  <script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbx-zsnfwBMax3huNDaxYXYKkhbrRkCONO2mqFGWxi9m58R-wgARpN3M1EbAqbPCXGz0/exec'
  const form = document.forms['submit-to-google-sheet']

  form.addEventListener('submit', e => {
    e.preventDefault()
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        // ✅ after successful submit → go to next page
        window.location.href = "thankyu.html";
      })
      .catch(error => console.error('Error!', error.message))
  })
</script>

</body>
</html>
