<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #4338ca;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .thank-you-box {
      background: #ffffff;
      padding: 40px 60px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .thank-you-box h1 {
      font-size: 2.5em;
      color: #4338ca;
      margin-bottom: 10px;
    }

  </style>
</head>
<body>

  <div class="thank-you-box">
    <h1>powerbi dashbord</h1>
    <img src="Screenshot (52).png" alt="">
  </div>

</body>
</html>
